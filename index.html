// 各領域のセルを読み書きするヘルパー
function getCell(region, i) {
  if (region === 'inv') return slots[i];
  if (region === 'grid') return craftGrid[i];
  if (region === 'out') return craftOut;
  const f = openFurnaceKey ? furnaces.get(openFurnaceKey) : null;
  if (!f) return null;
  return region === 'fin' ? f.in : region === 'ffuel' ? f.fuel : region === 'fout' ? f.out : null;
}
function setCell(region, i, v) {
  if (region === 'inv') { slots[i] = v; return; }
  if (region === 'grid') { craftGrid[i] = v; return; }
  const f = openFurnaceKey ? furnaces.get(openFurnaceKey) : null;
  if (!f) return;
  if (region === 'fin') f.in = v;
  else if (region === 'ffuel') f.fuel = v;
  else if (region === 'fout') f.out = v;
}

// マスをクリックしたときのアイテム移動ロジック
function handleSlot(region, i, right) {
  if (region === 'out') { if (!right) doCraft(); refreshInventoryScreen(); updateHotbar(); scheduleSave(); return; }
  if (region === 'fout') {            // かまどの完成スロットは取り出すだけ
    const cell = getCell('fout', 0);
    if (cell && (!held || held.id === cell.id)) {
      if (held) held.count += cell.count; else held = { id: cell.id, count: cell.count };
      setCell('fout', 0, null);
    }
    refreshInventoryScreen(); updateHotbar(); scheduleSave(); return;
  }
  const cell = getCell(region, i);
  if (!right) {
    // 左クリック：掴む / 置く / まとめる / 入れ替え
    if (!held) {
      if (cell) { held = cell; setCell(region, i, null); }
    } else if (!cell) {
      setCell(region, i, held); held = null;
    } else if (cell.id === held.id) {
      cell.count += held.count; held = null;
    } else {
      setCell(region, i, held); held = cell; // 入れ替え
    }
  } else {
    // 右クリック：何も持っていなければ半分つかむ／持っていれば1個ずつ置く
    if (!held) {
      if (cell) {
        const half = Math.ceil(cell.count / 2);
        held = { id: cell.id, count: half };
        cell.count -= half;
        if (cell.count <= 0) setCell(region, i, null);
      }
    } else if (!cell) {
      setCell(region, i, { id: held.id, count: 1 });
      if (--held.count <= 0) held = null;
    } else if (cell.id === held.id) {
      cell.count++;
      if (--held.count <= 0) held = null;
    }
  }
  if (region === 'grid') updateCraftOut();
  refreshInventoryScreen();
  updateHotbar();
  scheduleSave();
}

function refreshInventoryScreen() {
  invEl.querySelectorAll('.inv-slot').forEach(el => {
    const item = getCell(el.dataset.region, +el.dataset.idx);
    const sw = el.querySelector('.sw');
    const c = el.querySelector('.c');
    paintSwatch(sw, item ? item.id : null);
    c.textContent = item && item.count > 1 ? item.count : '';
  });
  if (uiMode === 'furnace' && openFurnaceKey) {
    const f = furnaces.get(openFurnaceKey);
    const prog = document.getElementById('furnaceProg');
    const flame = document.getElementById('furnaceFlame');
    if (prog) prog.style.width = Math.round((f ? f.prog : 0) * 100) + '%';
    if (flame) flame.style.opacity = (f && f.burn > 0) ? 1 : 0.15;
  }
  renderHeld();
}

// 掴んでいるアイテムの見た目と位置を更新
function renderHeld() {
  if (held) {
    heldEl.style.display = 'block';
    paintSwatch(heldEl.querySelector('.sw'), held.id);
    heldEl.querySelector('.c').textContent = held.count > 1 ? held.count : '';
    heldEl.style.left = (heldX - 16) + 'px';
    heldEl.style.top = (heldY - 16) + 'px';

    heldEl.style.display = 'none';

}

// 作業マスと手持ちをインベントリに戻す（紛失防止）
function returnCraftItems() {
  for (let k = 0; k < craftGrid.length; k++) {
    if (craftGrid[k]) { addItem(craftGrid[k].id, craftGrid[k].count); craftGrid[k] = null; }
  }
  if (held) { addItem(held.id, held.count); held = null; }
  updateCraftOut();
}

// n=2 ふつうのインベントリ / n=3 クラフトテーブル
function openInventory(n) {
  if (inventoryOpen) returnCraftItems();   // モードを切り替える時は中身を戻す
  uiMode = 'craft'; openFurnaceKey = null;
  craftN = n;
  craftGrid = new Array(n * n).fill(null);
  updateCraftOut();
  rebuildInvPanel();
  inventoryOpen = true;
  refreshInventoryScreen();
  invEl.style.display = 'flex';
  mining = false; resetMining();           // 採掘は中断
  document.exitPointerLock();              // カーソルを出す
}
// かまどを開く（素材/燃料→完成。中身はかまどに残る）
function openFurnace(x, y, z) {
  if (inventoryOpen) returnCraftItems();
  uiMode = 'furnace';
  openFurnaceKey = key(x, y, z);
  getFurnace(openFurnaceKey);
  rebuildInvPanel();
  inventoryOpen = true;
  refreshInventoryScreen();
  invEl.style.display = 'flex';
  mining = false; resetMining();
  document.exitPointerLock();
}
// かまどの精錬を進める（画面を開いている間だけ動く簡易版）
function updateFurnace(dt) {
  const f = openFurnaceKey ? furnaces.get(openFurnaceKey) : null;
  if (!f) return;
  const result = f.in ? SMELT[f.in.id] : undefined;          // 焼ける素材か
  const canOut = result !== undefined && (!f.out || (f.out.id === result)); // 完成スロットが受け取れる
  if (result !== undefined && canOut) {
    if (f.burn <= 0 && f.fuel && f.fuel.id === COAL) {        // 燃料を1個くべる
      f.fuel.count--; if (f.fuel.count <= 0) f.fuel = null;
      f.burn += BURN_PER_COAL;
    }
    if (f.burn > 0) {
      f.burn -= dt;
      f.prog += dt / SMELT_TIME;
      if (f.prog >= 1) {                                      // 1個完成
        f.prog = 0;
        f.in.count--; if (f.in.count <= 0) f.in = null;
        if (f.out) f.out.count++; else f.out = { id: result, count: 1 };
      }
    }
  } else {
    f.prog = 0;
  }
}
function closeInventory(toMenu) {
  returnCraftItems();
  inventoryOpen = false;
  invEl.style.display = 'none';
  updateHotbar();
  if (toMenu) overlay.style.display = 'flex';
  else canvas.requestPointerLock();        // ゲームに戻る

function toggleInventory() {
  if (inventoryOpen) closeInventory(false);

}

// ============================================================
//  メインループ
// ============================================================
// 世界の初期生成は「プレイ」を押したとき（enterWorld）に行う。
//  それまではメニューを表示。UI（ホットバー等）だけ先に組んでおく。
buildHotbar();
initInventoryScreen();

let worldStarted = false;
// マップコードからワールドへ入る（生成＋接続）。最初の1回だけ実行。
function enterWorld(code) {
  if (worldStarted) return;
  worldStarted = true;

  // マップコード＝部屋名＆シード＝セーブ先。同じコードなら同じ世界。
  NET_CFG.room = code;
  SAVE_KEY = 'mc_world_' + code;
  applySeed(code === 'world1' ? 1337 : mapSeed(code)); // world1 は従来シードを維持
  _heightCache.clear();

  // スポーン地点を地表の上へ
  const sh = Math.max(1, heightAt(0, 0));
  player.pos.set(0.5, sh + 2, 0.5);
  player.vel.set(0, 0, 0);

  // アカウントにこのマップの記録があれば、持ち物・居場所を復元
  restoreAccountMapState(code);

  if (ONLINE) Net.connect();   // DBの建築を読み込み＋リアルタイム接続
  else loadWorld();

  const pcx = chunkCoord(player.pos.x), pcz = chunkCoord(player.pos.z);
  for (let dz = -RENDER_DIST; dz <= RENDER_DIST; dz++)
    for (let dx = -RENDER_DIST; dx <= RENDER_DIST; dx++) generateChunk(pcx + dx, pcz + dz);
  for (let dz = -RENDER_DIST; dz <= RENDER_DIST; dz++)
    for (let dx = -RENDER_DIST; dx <= RENDER_DIST; dx++) buildChunkMesh(pcx + dx, pcz + dz);
}

let last = performance.now();
let frames = 0, fps = 0, fpsTimer = 0;
let netSendTimer = 0, accSaveTimer = 0;

function loop(now) {
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  // インベントリを開いていても時間は止めない（プレイヤーも動ける）。
  //  ・通常プレイ：移動＋採掘＋視点
  //  ・インベントリ中：移動だけ（視点はマウスがカーソルになるので動かない／採掘は無効）
  //  ・メニュー（ポインターロック解除中かつインベントリも閉）：一時停止
  if (worldStarted && document.pointerLockElement === canvas && !inventoryOpen) {
    updatePlayer(dt);
    updateMining(dt);
  } else if (worldStarted && inventoryOpen) {
    updatePlayer(dt);
    highlight.visible = false;
  } else {
    highlight.visible = false;
  }
  if (worldStarted) { updateChunks(dt); updateDrops(dt); } // ワールド開始後だけ
  updateRemotePlayers(dt); // 他プレイヤーを補間＋歩行/採掘モーション
  updateSelfAvatar(dt);    // 三人称のときの自分の本体
  updateHeldView(dt); // 一人称の手／持ち物の表示・アニメ
  if (inventoryOpen && uiMode === 'furnace') { updateFurnace(dt); refreshInventoryScreen(); }

  // 自分の位置を一定間隔で送信（未接続時は何もしない）
  netSendTimer += dt;
  if (netSendTimer >= 0.066) {   // ~15Hz でこまめに送り、受信側で補間
    netSendTimer = 0;
    const mv = Math.hypot(player.vel.x, player.vel.z); // 水平移動速度
    Net.sendPlayerState({
      x: player.pos.x, y: player.pos.y, z: player.pos.z,
      yaw, pitch, mv, mn: mining ? 1 : 0,
      it: slots[selected] ? slots[selected].id : -1,
    });
    // しばらく位置が来ないプレイヤー（切断/退出）はアバターを消す
    const nowMs = performance.now();
    for (const [pid, rp] of remotePlayers) if (nowMs - (rp.lastSeen || 0) > 4000) removeRemotePlayer(pid);
  }

  // アカウント×マップの持ち物・居場所を定期保存
  accSaveTimer += dt;
  if (accSaveTimer >= 3) { accSaveTimer = 0; if (worldStarted) saveAccountMapState(); }

  // FPS表示
  frames++; fpsTimer += dt;
  if (fpsTimer >= 0.5) { fps = Math.round(frames / fpsTimer); frames = 0; fpsTimer = 0; }
  const netInfo = ONLINE ? `  ${Net.enabled ? 'オンライン ' + (remotePlayers.size + 1) + '人' : '接続中…'}` : '';
  infoEl.textContent =
    `FPS: ${fps}  座標: ${player.pos.x.toFixed(1)}, ${player.pos.y.toFixed(1)}, ${player.pos.z.toFixed(1)}  ` +
    `表示チャンク: ${chunkMeshes.size}  変更ブロック: ${overrides.size}${netInfo}`;

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
